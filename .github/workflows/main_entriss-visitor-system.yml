name: Build and deploy Node.js app to Azure Web App - entriss-visitor-system

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      # === CRITICAL: Prepare standalone folder correctly ===
      - name: Prepare standalone deployment
        run: |
          # Copy necessary files into standalone folder
          cp -r public .next/standalone/ 2>/dev/null || true
          
          mkdir -p .next/standalone/.next
          cp -r .next/static .next/standalone/.next/ 2>/dev/null || true
          
          echo "✅ Standalone prepared"
          ls -la .next/standalone

      - name: Verify standalone contents
        run: |
          echo "===== STANDALONE ROOT ====="
          ls -la .next/standalone
      
          echo ""
          echo "===== STANDALONE .NEXT ====="
          ls -la .next/standalone/.next
      
          echo ""
          echo "===== BUILD_ID ====="
          find .next/standalone -name BUILD_ID
      
            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                name: node-app
                path: .next/standalone
                retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_49B5D62B5F274390BB423AFAD9671C45 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8B9782618E884745B53AE66CE687017D }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_59EAA166BD8B4FC7A7E93D3CFA079440 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'entriss-visitor-system'
          slot-name: 'Production'
          package: .
