name: Build and deploy Node.js app to Azure Web App - entriss-visitor-system

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build

      - name: Verify Next installation
        run: |
          echo "===== CHECK NEXT ====="
          ls -la node_modules/.bin

          echo ""
          echo "===== CHECK NEXT PACKAGE ====="
          ls -la node_modules/next

          echo ""
          echo "===== CHECK NEXT VERSION ====="
          npx next --version

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_49B5D62B5F274390BB423AFAD9671C45 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8B9782618E884745B53AE66CE687017D }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_59EAA166BD8B4FC7A7E93D3CFA079440 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'entriss-visitor-system'
          slot-name: 'Production'
          package: .
