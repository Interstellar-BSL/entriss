name: Build and deploy Next.js app to Azure Web App - entriss-visitor-system

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      # ===============================
      # PACKAGE ONLY WHAT AZURE NEEDS
      # ===============================
      - name: Prepare deployment folder
        run: |
          mkdir -p deploy

          # ✅ Standalone server (includes minimal node_modules)
          cp -r .next/standalone deploy/
          
          # ✅ Static files required by Next
          cp -r .next/static deploy/.next/
          
          # ✅ Public assets
          cp -r public deploy/ || true
          
          # Optional (some apps need it)
          cp package.json deploy/
          
          echo "✅ Deployment folder ready"
          ls -la deploy

      - name: Create deployment zip
        run: |
          cd deploy
          zip -r ../deploy.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-app
          path: deploy.zip
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-app

      - name: Extract package
        run: unzip deploy.zip -d deploy

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_49B5D62B5F274390BB423AFAD9671C45 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8B9782618E884745B53AE66CE687017D }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_59EAA166BD8B4FC7A7E93D3CFA079440 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'entriss-visitor-system'
          slot-name: 'Production'
          package: deploy.zip
